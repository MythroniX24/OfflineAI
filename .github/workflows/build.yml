name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # NDK needed for C++ compilation
      - name: Install NDK 26 and CMake 3.22
        run: |
          SDKM="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKM "ndk;26.3.11579264" "cmake;3.22.1" \
            "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
          echo "NDK_PATH=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          [ -f gradle/wrapper/gradle-wrapper.jar ] || \
            curl -fsSL "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.NDK_PATH }}
          ANDROID_NDK_ROOT: ${{ env.NDK_PATH }}

      - name: Verify and rename APK
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK" || { echo "APK not found"; exit 1; }
          mkdir -p artifacts
          cp "$APK" "artifacts/OfflineAI-v${{ github.run_number }}-debug.apk"
          ls -lh artifacts/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OfflineAI-APK-v${{ github.run_number }}
          path: artifacts/OfflineAI-v${{ github.run_number }}-debug.apk
          retention-days: 60
          if-no-files-found: error

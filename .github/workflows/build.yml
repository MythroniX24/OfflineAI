name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install NDK 26.3.11579264 and CMake 3.22.1
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER \
            "ndk;26.3.11579264" \
            "cmake;3.22.1" \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>/dev/null || true
          echo "NDK_PATH=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      # ── Clone llama.cpp + verify with both old and new header paths ───────────
      - name: Clone llama.cpp
        run: |
          LLAMA_DIR="app/src/main/cpp/llama.cpp"
          echo "Cloning llama.cpp (depth=1)..."
          git clone --depth 1 \
            https://github.com/ggerganov/llama.cpp.git \
            "$LLAMA_DIR"

          # Newer llama.cpp has llama.h in include/ not root
          # Accept either location
          if [ -f "$LLAMA_DIR/llama.h" ]; then
            echo "✅ Found llama.h at root"
          elif [ -f "$LLAMA_DIR/include/llama.h" ]; then
            echo "✅ Found llama.h at include/"
          else
            echo "❌ llama.h not found in root or include/"
            echo "Contents of cloned dir:"
            ls "$LLAMA_DIR/" | head -20
            exit 1
          fi

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            curl -fsSL \
              "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            -Pandroid.ndkVersion=26.3.11579264 \
            --no-daemon \
            --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.NDK_PATH }}
          ANDROID_NDK_ROOT: ${{ env.NDK_PATH }}

      - name: Verify and rename APK
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK" || { echo "❌ APK not found"; find app/build -name "*.apk" 2>/dev/null; exit 1; }
          mkdir -p artifacts
          cp "$APK" "artifacts/OfflineAI-v${{ github.run_number }}-debug.apk"
          ls -lh artifacts/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OfflineAI-APK-v${{ github.run_number }}
          path: artifacts/OfflineAI-v${{ github.run_number }}-debug.apk
          retention-days: 60
          if-no-files-found: error

      - name: Build summary
        if: always()
        run: |
          echo "## OfflineAI Build #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          if [ -f "artifacts/OfflineAI-v${{ github.run_number }}-debug.apk" ]; then
            echo "| Status | ✅ SUCCESS |" >> $GITHUB_STEP_SUMMARY
            echo "| APK Size | $(du -sh artifacts/*.apk | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Status | ❌ FAILED |" >> $GITHUB_STEP_SUMMARY
          fi

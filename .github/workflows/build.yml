name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Cache llama.cpp ───────────────────────────────────────────────────
      - name: Cache llama.cpp clone
        id: cache-llama
        uses: actions/cache@v4
        with:
          path: app/src/main/cpp/llama.cpp
          key: llama-cpp-${{ hashFiles('.llama-version') }}-v1
          restore-keys: llama-cpp-

      - name: Clone llama.cpp if not cached
        if: steps.cache-llama.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 \
            https://github.com/ggerganov/llama.cpp.git \
            app/src/main/cpp/llama.cpp

      # ── 3. JDK 17 ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Download gradle-wrapper.jar ───────────────────────────────────────
      #    gradlew script is in repo but gradle-wrapper.jar is a binary.
      #    We download it from the official Gradle GitHub repo.
      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper jar: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"

      # ── 5. Make gradlew executable ───────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 6. Cache Gradle dependencies ─────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 7. Install NDK 26 and CMake 3.22 ─────────────────────────────────────
      - name: Install NDK and CMake
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER \
            "ndk;26.3.11579264" \
            "cmake;3.22.1" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            --sdk_root=$ANDROID_SDK_ROOT 2>/dev/null || true
          echo "NDK path: $ANDROID_SDK_ROOT/ndk/26.3.11579264"

      # ── 8. Build Debug APK ────────────────────────────────────────────────────
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            -Pandroid.ndkVersion=26.3.11579264 \
            --no-daemon \
            --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264

      # ── 9. Verify and rename APK ──────────────────────────────────────────────
      - name: Verify and rename APK
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK" ]; then
            echo "ERROR: APK not found"
            find app/build -name "*.apk" 2>/dev/null || true
            exit 1
          fi
          mkdir -p artifacts
          cp "$APK" "artifacts/OfflineAI-v${{ github.run_number }}-debug.apk"
          ls -lh artifacts/

      # ── 10. Upload APK artifact ───────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OfflineAI-APK-v${{ github.run_number }}
          path: artifacts/OfflineAI-v${{ github.run_number }}-debug.apk
          retention-days: 60
          if-no-files-found: error

      # ── 11. Summary ───────────────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## OfflineAI Build" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          if [ -f "artifacts/OfflineAI-v${{ github.run_number }}-debug.apk" ]; then
            SIZE=$(du -sh artifacts/*.apk | cut -f1)
            echo "| APK Size | $SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | SUCCESS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Status | FAILED |" >> $GITHUB_STEP_SUMMARY
          fi

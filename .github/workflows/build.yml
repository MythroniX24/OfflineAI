name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Clone llama.cpp (ALWAYS — cache is unreliable for large repos) ────
      # We clone fresh every time so CMake always finds llama.h
      - name: Clone llama.cpp
        run: |
          LLAMA_DIR="app/src/main/cpp/llama.cpp"
          if [ -f "$LLAMA_DIR/llama.h" ]; then
            echo "llama.cpp already present, skipping clone"
          else
            echo "Cloning llama.cpp..."
            git clone --depth 1 \
              https://github.com/ggerganov/llama.cpp.git \
              "$LLAMA_DIR"
          fi
          echo "llama.h exists: $(ls $LLAMA_DIR/llama.h)"

      # ── 4. Download gradle-wrapper.jar ───────────────────────────────────────
      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            curl -fsSL \
              "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
          fi
          echo "Wrapper jar: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"

      # ── 5. Make gradlew executable ───────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 6. Cache Gradle dependencies ─────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 7. Install NDK 26 and CMake 3.22 ─────────────────────────────────────
      - name: Install NDK and CMake
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER \
            "ndk;26.3.11579264" \
            "cmake;3.22.1" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            --sdk_root=$ANDROID_SDK_ROOT 2>/dev/null || true
          
          # Verify NDK installed correctly
          ls $ANDROID_SDK_ROOT/ndk/ || echo "NDK dir listing failed"
          echo "Using NDK: $ANDROID_SDK_ROOT/ndk/26.3.11579264"

      # ── 8. Build Debug APK ────────────────────────────────────────────────────
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            -Pandroid.ndkVersion=26.3.11579264 \
            --no-daemon \
            --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264

      # ── 9. Verify and rename APK ──────────────────────────────────────────────
      - name: Verify and rename APK
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK" ]; then
            echo "ERROR: APK not found"
            find app/build -name "*.apk" 2>/dev/null || true
            exit 1
          fi
          mkdir -p artifacts
          cp "$APK" "artifacts/OfflineAI-v${{ github.run_number }}-debug.apk"
          ls -lh artifacts/

      # ── 10. Upload APK artifact ───────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OfflineAI-APK-v${{ github.run_number }}
          path: artifacts/OfflineAI-v${{ github.run_number }}-debug.apk
          retention-days: 60
          if-no-files-found: error

      # ── 11. Summary ───────────────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## OfflineAI Build" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          if [ -f "artifacts/OfflineAI-v${{ github.run_number }}-debug.apk" ]; then
            SIZE=$(du -sh artifacts/*.apk | cut -f1)
            echo "| APK Size | $SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | SUCCESS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Status | FAILED |" >> $GITHUB_STEP_SUMMARY
          fi
